<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Özbek Pide - Giriş</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('https://images.unsplash.com/photo-1604908554164-1f3d5e0c5d7c') no-repeat center center/cover;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
    }

    .container {
      position: relative;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      padding: 40px;
      border-radius: 20px;
      width: 360px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      animation: fadeIn 1s ease;
      border: 1px solid rgba(255,255,255,0.2);
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(30px);} 
      to {opacity: 1; transform: translateY(0);} 
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
      color: #f1c40f;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .subtitle {
      text-align: center;
      color: #eee;
      margin-bottom: 25px;
      font-size: 13px;
    }

    .input-group {
      position: relative;
      margin-bottom: 25px;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      outline: none;
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 14px;
    }

    .input-group label {
      position: absolute;
      top: 50%;
      left: 12px;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.7);
      pointer-events: none;
      transition: 0.3s;
    }

    .input-group input:focus + label,
    .input-group input:valid + label {
      top: -8px;
      font-size: 12px;
      color: #f1c40f;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(45deg, #e67e22, #d35400);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      letter-spacing: 1px;
    }

    button:hover {
      transform: scale(1.05);
      background: linear-gradient(45deg, #d35400, #e67e22);
    }

    .error {
      color: #ff7675;
      text-align: center;
      margin-top: 10px;
      display: none;
    }

    .success {
      color: #55efc4;
      text-align: center;
      margin-top: 10px;
      display: none;
    }

    .logo {
      text-align: center;
      font-size: 20px;
      color: white;
      margin-bottom: 5px;
      font-weight: bold;
    }

  </style>
</head>
<body>

<div class="container">
  <div class="logo">🍕 ÖZBEK PİDE</div>
  <h2>Personel Girişi</h2>
  <div class="subtitle">Sisteme giriş yaparak siparişleri yönetin</div>

  <div class="input-group">
    <input type="text" id="username" required>
    <label>Kullanıcı Adı</label>
  </div>

  <div class="input-group">
    <input type="password" id="password" required>
    <label>Şifre</label>
  </div>

  <button onclick="login()">GİRİŞ YAP</button>

  <div class="error" id="error">Hatalı giriş!</div>
  <div class="success" id="success">Giriş başarılı!</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged
} from
"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyBR7zcqJe9lAAGngONaCj8LG6q7AejWHL0",
authDomain: "limoncafe.firebaseapp.com",
projectId: "limoncafe",
storageBucket: "limoncafe.firebasestorage.app",
messagingSenderId: "495889481405",
appId: "1:495889481405:web:735b029d32c156754781d4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth,(user)=>{

if(user){

window.location.href="admin.html";

}

});

/* LOGIN */
window.login = function() {

const email = document.getElementById("username").value;
const password = document.getElementById("password").value;

const error = document.getElementById("error");
const success = document.getElementById("success");

error.style.display = "none";
success.style.display = "none";

signInWithEmailAndPassword(auth, email, password)
.then((userCredential) => {

success.style.display = "block";


setTimeout(() => {
window.location.href = "admin.html";
}, 1200);

})
.catch((error) => {

const errorDiv = document.getElementById("error");
const successDiv = document.getElementById("success");

successDiv.style.display = "none";
errorDiv.style.display = "block";

// Firebase hata mesajını daha kullanıcı dostu yapıyoruz
let msg = "Hatalı giriş!";

if(error.code === "auth/user-not-found"){
  msg = "Kullanıcı bulunamadı!";
}
else if(error.code === "auth/wrong-password"){
  msg = "Şifre hatalı!";
}
else if(error.code === "auth/invalid-email"){
  msg = "Geçersiz e-posta!";
}
else{
  msg = "Giriş başarısız!";
}

errorDiv.innerText = msg;

});
}

</script>

</body>
</html>
