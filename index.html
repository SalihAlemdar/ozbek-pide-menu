<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Özbek Pide Menü</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI'}
body{
background:#1e1e2f;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
overflow-x:hidden;
}


.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:14px 20px;
background:linear-gradient(90deg,#2c2c54,#1e1e2f);
box-shadow:0 5px 20px rgba(0,0,0,0.25);
position:sticky;
top:0;
z-index:1000;
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.brand-logo{
width:42px;
height:42px;
object-fit:cover;
border-radius:12px;
background:white;
padding:4px;
box-shadow:0 4px 15px rgba(0,0,0,0.25);
}

.logo{
font-size:22px;
font-weight:700;
color:#f39c12;
letter-spacing:0.5px;
}

.lang-area{
display:flex;
align-items:center;
justify-content:flex-end;
min-width:90px;
}

#langSelect{
font-size:15px;
padding:8px 12px;
border-radius:10px;
border:none;
outline:none;
background:#3b3b6d;
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
width:110px;
text-align:center;
appearance:none;
-webkit-appearance:none;
-moz-appearance:none;
}

#langSelect:hover{
background:#4b4b85;
transform:translateY(-1px);
}

#langSelect option{
background:#2c2c54;
color:white;
}



select{padding:6px;border-radius:6px}

.container{padding:20px; flex: 1; width:100%; }

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px}

.card,.product{background:#2c2c54;border-radius:15px;overflow:hidden;cursor:pointer;transition:.3s}
.card:hover,.product:hover{transform:scale(1.05)}

.card img,.product img{width:100%;aspect-ratio: 1/1; object-fit:cover; display: block;}

.card h3{text-align:center; padding:6px; }

.product-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}

.price{text-align:center; padding: 6px; color:#f39c12}
.back{margin-bottom:15px;color:#f39c12;cursor:pointer}

.modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{background:#2c2c54;padding:20px;border-radius:15px;width:90%;max-width:350px;text-align:center}
.modal img{width:100%;height:180px;object-fit:cover;border-radius:10px}
.modal-close{position:absolute; top:12px; right:15px; font-size:22px; cursor:pointer; color:#f39c12; font-weight:bold; }


/* FOOTER */

.footer{
margin-top:40px;
background:linear-gradient(180deg,#2c2c54,#1e1e2f);
padding:25px 20px 15px;
border-top:1px solid rgba(255,255,255,0.08);
width:100%;
display:block;
}

.footer-container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
max-width:900px;
margin:auto;
}

.footer-card{
display:flex;
align-items:center;
gap:15px;
background:#3b3b6d;
padding:18px;
border-radius:18px;
text-decoration:none;
color:white;
transition:0.3s;
box-shadow:0 5px 20px rgba(0,0,0,0.25);
}

.footer-card:hover{
transform:translateY(-3px);
background:#4b4b85;
}

.footer-icon{
width:55px;
height:55px;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
background:#f39c12;
font-size:24px;
flex-shrink:0;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

.footer-card h3{
font-size:17px;
margin-bottom:4px;
color:#f39c12;
}

.footer-card p{
font-size:14px;
color:#ddd;
line-height:1.4;
}

.footer-bottom{
text-align:center;
margin-top:25px;
font-size:13px;
color:#aaa;
}

@media(max-width:768px){ 
  .product-grid{
  grid-template-columns:1fr;
  }

  .product{
  width:100%;
  }

  .footer-container{
   grid-template-columns:repeat(2,1fr);
   gap:10px;
   }

   .footer-card{
   flex-direction:column;
   text-align:center;
   gap:10px;
   padding:14px 10px;
  }

   .footer-card h3{
   font-size:15px;
  }

   .footer-card p{
   font-size:12px;
  }
}
</style>
</head>

<body>

<div class="header">

<div class="brand">

<img 
src="logo1.jpeg"
class="brand-logo"
>

<div class="logo">Özbek Pide Pizza</div>

</div>

<div class="lang-area">

<select id="langSelect" onchange="changeLang()">
<option value="tr">🇹🇷 TR</option>
<option value="en">🇬🇧 EN</option>
<option value="ar">🇸🇦 AR</option>
</select>

</div>

</div>

<div class="container">
<div id="kategoriView" class="grid"></div>

<div id="urunView" style="display:none">
<div class="back" onclick="goBack()">← Geri</div>
<div id="urunList"></div>
</div>
</div>

<div class="modal" id="urunModal">
<div class="modal-content">
<div class="modal-close" onclick="closeModal()">✖</div>
<img id="modalImg">
<h3 id="modalAd"></h3>
<div class="price" id="modalFiyat"></div>
</div>
</div>

<!-- FOOTER -->

<footer class="footer">

<div class="footer-container">

<a href="tel:+904627215252" class="footer-card">

<div class="footer-icon">📞</div>

<div>
<h3>Telefon</h3>
<p>0(462) 721 52 52</p>
</div>

</a>

<a 
href="https://maps.google.com?q=%C3%96zbek%20Pide,%20Merkez,%20Yunus%20Emre%20Cd.%2017/A,%2061700%20Arakl%C4%B1/Trabzon&ftid=0x40642d75cb08b243:0xfaabb2b17ac52916&entry=gps&shh=CAE&lucs=,94297699,100808504,94284490,94231188,94280568,47071704,94218641,94282134,100799877,94286869&g_st=iw"
target="_blank"
class="footer-card"
>

<div class="footer-icon">📍</div>

<div>
<h3>Yol Tarifi</h3>
<p>Google Maps ile rota oluştur</p>
</div>

</a>

</div>

<div class="footer-bottom">
© 2026 Özbek Pide - Tüm Hakları Saklıdır
</div>

</footer>

<!-- 🔥 FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig = {
apiKey: "AIzaSyBR7zcqJe9lAAGngONaCj8LG6q7AejWHL0",
authDomain: "limoncafe.firebaseapp.com",
projectId: "limoncafe",
storageBucket: "limoncafe.firebasestorage.app",
messagingSenderId: "495889481405",
appId: "1:495889481405:web:735b029d32c156754781d4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🌍 Dil
let currentLang = localStorage.getItem('lang') || 'tr';

// 🔥 Firebase verileri
let kategoriler = [];
let urunler = [];

// 🔥 VERİ ÇEK
function loadData(){

// 📂 KATEGORİLER CANLI TAKİP
onSnapshot(collection(db, "kategoriler"), (snapshot) => {

kategoriler = snapshot.docs.map(d => ({
  id: d.id,
  ...d.data()
}));

renderKategori();

});

// 🍽️ ÜRÜNLER CANLI TAKİP
onSnapshot(collection(db, "urunler"), (snapshot) => {

urunler = snapshot.docs.map(d => ({
  id: d.id,
  ...d.data()
}));

// eğer kategori açıksa anında güncelle
const kategoriView = document.getElementById('kategoriView').style.display;

if(kategoriView === 'none'){
  // ürün ekranındaysan yeniden çiz
  const activeIndex = window._activeKategoriIndex;

  if(activeIndex !== undefined){
    openKategori(activeIndex);
  }
}

});

}

// 🌍 ÇEVİRİ
async function translateText(text){
  if(currentLang === 'tr') return text;

  try{
    const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=tr&tl=${currentLang}&dt=t&q=${encodeURIComponent(text)}`);
    const data = await res.json();
    return data[0][0][0];
  }catch{
    return text;
  }
}

// 📂 KATEGORİ
async function renderKategori(){
  const div = document.getElementById('kategoriView');
  div.innerHTML = '';

  for(let i=0;i<kategoriler.length;i++){
    const k = kategoriler[i];
    const ad = await translateText(k.ad);

    div.innerHTML += `
    <div class="card" onclick="openKategori(${i})">
      <img src="${k.foto}">
      <h3>${ad}</h3>
    </div>`;
  }
}

// 🍽️ ÜRÜN
window.openKategori = async function(i){
  window._activeKategoriIndex = i;
  document.getElementById('kategoriView').style.display='none';
  document.getElementById('urunView').style.display='block';

  const list = document.getElementById('urunList');
  list.innerHTML = '<div class="product-grid"></div>';
  const grid = list.querySelector('.product-grid');

  const seciliKat = kategoriler[i].ad;

  const filtreli = urunler.filter(u => u.kategori === seciliKat);

  for(let u of filtreli){
    const ad = await translateText(u.ad);

    const card = document.createElement('div');
    card.className='product';

    card.innerHTML = `

    <div class="card")">
      <img src="${u.foto}">
      <h3>${ad}</h3>
      <div class="price">${u.fiyat}₺</div>
    </div>
    `;

    card.onclick = ()=>openModal(u);
    grid.appendChild(card);
  }
}

// 📦 MODAL
window.openModal = async function(u){
  document.getElementById('modalImg').src = u.foto;
  document.getElementById('modalAd').innerText = await translateText(u.ad);
  document.getElementById('modalFiyat').innerText = u.fiyat + '₺';

  document.getElementById('urunModal').classList.add('active');
}

window.goBack = function(){
  document.getElementById('kategoriView').style.display='grid';
  document.getElementById('urunView').style.display='none';
}

window.changeLang = function(){

currentLang = document.getElementById('langSelect').value;
localStorage.setItem('lang', currentLang);

// kategori yeniden çiz
renderKategori();

// eğer ürün ekranı açıksa onu da yeniden çiz
if(document.getElementById('urunView').style.display === 'block'){
  const activeIndex = window._activeKategoriIndex;

  if(activeIndex !== undefined){
    openKategori(activeIndex);
  }
}

}

window.closeModal=function(){
document.getElementById('urunModal').classList.remove('active');
}

document.getElementById('urunModal').addEventListener('click',function(e){

if(e.target.id==='urunModal'){
closeModal();
}

});

// 🚀 BAŞLAT
loadData();

</script>

</body>
</html>
