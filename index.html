<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Özbek Pide Menü</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI'}
body{background:#1e1e2f;color:white}

.header{display:flex; justify-content:center; padding:15px; background:#2c2c54}

.logo{font-size:20px;font-weight:bold; text-align:center;color:#f39c12; padding-right: 20px;}
.mobile-logo{ flex:1; text-align:center; font-size:20px; font-weight:bold; color:#f39c12; margin-right:22px; }

select{padding:6px;border-radius:6px}

.container{padding:20px}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px}

.card,.product{background:#2c2c54;border-radius:15px;overflow:hidden;cursor:pointer;transition:.3s}
.card:hover,.product:hover{transform:scale(1.05)}

.card img,.product img{width:100%;height:120px;object-fit:cover}

.card h3{text-align:center; padding:6px; }

.product-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}

.price{text-align:center; padding: 6px; color:#f39c12}
.back{margin-bottom:15px;color:#f39c12;cursor:pointer}

.modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{background:#2c2c54;padding:20px;border-radius:15px;width:90%;max-width:350px;text-align:center}
.modal img{width:100%;height:180px;object-fit:cover;border-radius:10px}
.modal-close{position:absolute; top:12px; right:15px; font-size:22px; cursor:pointer; color:#f39c12; font-weight:bold; }

@media(max-width:768px){ 
  .product-grid{
  grid-template-columns:1fr;
  }

  .product{
  width:100%;
  }
}
</style>
</head>

<body>

<div class="header">
<div class="logo">🍞 Özbek Pide</div>

<select id="langSelect" onchange="changeLang()">
<option value="tr">TR</option>
<option value="en">EN</option>
<option value="ar">AR</option>
</select>
</div>

<div class="container">
<div id="kategoriView" class="grid"></div>

<div id="urunView" style="display:none">
<div class="back" onclick="goBack()">← Geri</div>
<div id="urunList"></div>
</div>
</div>

<div class="modal" id="urunModal">
<div class="modal-content">
<div class="modal-close" onclick="closeModal()">✖</div>
<img id="modalImg">
<h3 id="modalAd"></h3>
<div class="price" id="modalFiyat"></div>
</div>
</div>

<!-- 🔥 FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig = {
apiKey: "AIzaSyBR7zcqJe9lAAGngONaCj8LG6q7AejWHL0",
authDomain: "limoncafe.firebaseapp.com",
projectId: "limoncafe",
storageBucket: "limoncafe.firebasestorage.app",
messagingSenderId: "495889481405",
appId: "1:495889481405:web:735b029d32c156754781d4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🌍 Dil
let currentLang = localStorage.getItem('lang') || 'tr';

// 🔥 Firebase verileri
let kategoriler = [];
let urunler = [];

// 🔥 VERİ ÇEK
function loadData(){

// 📂 KATEGORİLER CANLI TAKİP
onSnapshot(collection(db, "kategoriler"), (snapshot) => {

kategoriler = snapshot.docs.map(d => ({
  id: d.id,
  ...d.data()
}));

renderKategori();

});

// 🍽️ ÜRÜNLER CANLI TAKİP
onSnapshot(collection(db, "urunler"), (snapshot) => {

urunler = snapshot.docs.map(d => ({
  id: d.id,
  ...d.data()
}));

// eğer kategori açıksa anında güncelle
const kategoriView = document.getElementById('kategoriView').style.display;

if(kategoriView === 'none'){
  // ürün ekranındaysan yeniden çiz
  const activeIndex = window._activeKategoriIndex;

  if(activeIndex !== undefined){
    openKategori(activeIndex);
  }
}

});

}

// 🌍 ÇEVİRİ
async function translateText(text){
  if(currentLang === 'tr') return text;

  try{
    const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=tr&tl=${currentLang}&dt=t&q=${encodeURIComponent(text)}`);
    const data = await res.json();
    return data[0][0][0];
  }catch{
    return text;
  }
}

// 📂 KATEGORİ
async function renderKategori(){
  const div = document.getElementById('kategoriView');
  div.innerHTML = '';

  for(let i=0;i<kategoriler.length;i++){
    const k = kategoriler[i];
    const ad = await translateText(k.ad);

    div.innerHTML += `
    <div class="card" onclick="openKategori(${i})">
      <img src="${k.foto}">
      <h3>${ad}</h3>
    </div>`;
  }
}

// 🍽️ ÜRÜN
window.openKategori = async function(i){
  window._activeKategoriIndex = i;
  document.getElementById('kategoriView').style.display='none';
  document.getElementById('urunView').style.display='block';

  const list = document.getElementById('urunList');
  list.innerHTML = '<div class="product-grid"></div>';
  const grid = list.querySelector('.product-grid');

  const seciliKat = kategoriler[i].ad;

  const filtreli = urunler.filter(u => u.kategori === seciliKat);

  for(let u of filtreli){
    const ad = await translateText(u.ad);

    const card = document.createElement('div');
    card.className='product';

    card.innerHTML = `

    <div class="card")">
      <img src="${u.foto}">
      <h3>${ad}</h3>
      <div class="price">${u.fiyat}₺</div>
    </div>
    `;

    card.onclick = ()=>openModal(u);
    grid.appendChild(card);
  }
}

// 📦 MODAL
window.openModal = async function(u){
  document.getElementById('modalImg').src = u.foto;
  document.getElementById('modalAd').innerText = await translateText(u.ad);
  document.getElementById('modalFiyat').innerText = u.fiyat + '₺';

  document.getElementById('urunModal').classList.add('active');
}

window.goBack = function(){
  document.getElementById('kategoriView').style.display='grid';
  document.getElementById('urunView').style.display='none';
}

window.changeLang = function(){

currentLang = document.getElementById('langSelect').value;
localStorage.setItem('lang', currentLang);

// kategori yeniden çiz
renderKategori();

// eğer ürün ekranı açıksa onu da yeniden çiz
if(document.getElementById('urunView').style.display === 'block'){
  const activeIndex = window._activeKategoriIndex;

  if(activeIndex !== undefined){
    openKategori(activeIndex);
  }
}

}

window.closeModal=function(){
document.getElementById('urunModal').classList.remove('active');
}

document.getElementById('urunModal').addEventListener('click',function(e){

if(e.target.id==='urunModal'){
closeModal();
}

});

// 🚀 BAŞLAT
loadData();

</script>

</body>
</html>
